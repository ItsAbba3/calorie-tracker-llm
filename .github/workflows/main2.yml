name: EAS Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # اجازه commit/push از Actions

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Show Expo user (debug)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas whoami || true

      - name: Run eas build:configure
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build:configure

      - name: Commit and push configuration changes if any
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "ci: update EAS configuration"
            git push origin HEAD:main
          else
            echo "No configuration changes to commit"
          fi

      - name: EAS Build (Android, production profile)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile production --non-interactive
